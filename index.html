<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --wine:#6B1535;
  --col-y:#FCD116;
  --col-b:#003087;
  --col-r:#CE1126;
}
body{
  background:var(--wine);
  font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    radial-gradient(circle at 15% 25%, rgba(180,30,70,0.4) 0%, transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(100,10,40,0.5) 0%, transparent 45%),
    repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px, transparent 0, transparent 50%);
  background-size:100% 100%, 100% 100%, 8px 8px;
}

/* TOP BAR */
.top-bar{
  background:rgba(0,0,0,0.35);
  border-bottom:2px solid rgba(255,255,255,0.08);
  padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:52px;
  position:sticky;top:0;z-index:50;
}
.top-nav-btn{
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.2);
  color:white;width:36px;height:36px;border-radius:50%;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;line-height:1;
}
.top-nav-btn:hover{background:rgba(255,255,255,0.2);}
.top-bar-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:3px;color:white;
  background:rgba(0,0,0,0.4);
  padding:6px 20px;border-radius:20px;
}

/* ALBUM OUTER */
.album-outer{padding:20px 16px 30px;max-width:820px;margin:0 auto;}

/* SINGLE PAGE */
.page{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  position:relative;
  min-height:520px;
  padding:24px 22px 22px;
}

/* Color blobs */
.blob-y{position:absolute;bottom:-60px;left:-50px;width:340px;height:340px;background:var(--col-y);border-radius:50%;opacity:0.8;z-index:0;pointer-events:none;}
.blob-b{position:absolute;top:-80px;right:-60px;width:280px;height:280px;background:var(--col-b);border-radius:50%;opacity:0.85;z-index:0;pointer-events:none;}
.blob-r{position:absolute;top:35%;left:30%;width:220px;height:220px;background:var(--col-r);border-radius:50%;opacity:0.35;z-index:0;pointer-events:none;}
.big-num{
  position:absolute;bottom:-30px;right:-20px;
  font-family:'Bebas Neue',sans-serif;font-size:320px;
  color:rgba(255,255,255,0.08);line-height:1;z-index:1;
  pointer-events:none;letter-spacing:-10px;user-select:none;
}

/* PAGE HEADER */
.page-header{
  position:relative;z-index:2;
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:20px;
  flex-wrap:wrap;gap:12px;
}
.page-header-left{}
.we-are{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--col-y);line-height:1;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:4px;color:var(--col-b);line-height:1;}
.fed-badge{display:flex;align-items:center;gap:8px;margin-top:8px;}
.fed-flag{width:38px;height:24px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,0.3);flex-shrink:0;}
.fed-flag div{flex:1;}
.fy{background:#FCD116;}.fb{background:#003087;}.fr{background:#CE1126;}
.fed-text{font-size:10px;font-weight:700;color:#333;line-height:1.3;}

.page-header-right{}
.group-box{
  background:#1a1a2e;border-radius:10px;padding:10px 14px;
}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:white;margin-bottom:8px;}
.group-flags{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.gf-item{background:rgba(255,255,255,0.08);border-radius:5px;padding:4px 7px;display:flex;align-items:center;gap:5px;}
.gf-code{font-size:9px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,0.7);writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);}
.gf-flag{width:38px;height:24px;border-radius:2px;flex-shrink:0;}
.flag-por{background:linear-gradient(to right,#006600 40%,#FF0000 40%);}
.flag-cod{background:linear-gradient(to right,#007FFF 33%,#FFCD00 33%,#FFCD00 66%,#CE1126 66%);}
.flag-uzb{background:linear-gradient(to bottom,#1EB53A 33%,white 33%,white 66%,#CE1126 66%);}
.flag-col{display:flex;flex-direction:column;}
.flag-col div:nth-child(1){flex:2;background:#FCD116;}
.flag-col div:nth-child(2){flex:1;background:#003087;}
.flag-col div:nth-child(3){flex:1;background:#CE1126;}

/* STICKERS GRID */
.stickers-grid{
  position:relative;z-index:2;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* SLOT */
.slot{
  background:#f5e8c0;
  border-radius:10px;
  padding:7px 6px 7px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
  min-height:150px;
  cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s;
  border:2.5px solid var(--col-y);
  box-shadow:0 3px 12px rgba(0,0,0,0.15);
}
.slot:hover{
  transform:scale(1.05) rotate(-2deg);
  box-shadow:0 10px 28px rgba(0,0,0,0.28);
  z-index:10;
}
.slot-num{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;
  color:#222;background:var(--col-y);
  padding:2px 7px;border-radius:4px;margin-bottom:5px;align-self:flex-start;
}
.slot-img-wrap{
  width:100%;height:100px;border-radius:6px;overflow:hidden;
  background:#d4c5a0;display:flex;align-items:center;justify-content:center;flex:1;
}
.slot-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.slot-empty-icon{font-size:28px;opacity:0.22;}
.slot-name{
  font-size:9px;font-weight:800;letter-spacing:0.5px;
  color:#333;text-transform:uppercase;text-align:center;
  margin-top:5px;line-height:1.2;
}
.slot-name span{font-weight:400;display:block;font-size:8px;color:#666;}

/* PROGRESS - TU DISEÑO ORIGINAL EXACTO DE LA IMAGEN */
.progress-wrap{
  position:relative;z-index:2;margin-top:16px;
  display:flex;align-items:center;gap:10px;
}
.progress-label{font-size:11px;letter-spacing:1px;color:rgba(0,0,0,0.4);font-weight:700;white-space:nowrap;}
.progress-bar-outer{flex:1;height:6px;background:rgba(0,0,0,0.1);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(to right,var(--col-y),var(--col-r));border-radius:3px;width:0%; transition: width 0.3s ease;}
.progress-count{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:rgba(0,0,0,0.4);white-space:nowrap;}

/* PAGINATION */
.pagination{
  display:flex;align-items:center;justify-content:center;gap:0;
  margin:18px auto 0;
  background:rgba(0,0,0,0.5);border-radius:30px;overflow:hidden;
  width:fit-content;box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.pag-btn{
  background:transparent;border:none;color:white;font-size:22px;
  width:50px;height:46px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background 0.15s;
}
.pag-btn:hover{background:rgba(255,255,255,0.12);}
.pag-label{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  letter-spacing:3px;color:white;padding:0 22px;
  border-left:1px solid rgba(255,255,255,0.15);
  border-right:1px solid rgba(255,255,255,0.15);
  line-height:46px;
}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(50,10,25,0.85);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
  padding:20px;
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-inner{
  display:flex;align-items:center;gap:24px;max-width:620px;width:100%;
  transform:scale(0.9) translateY(24px);
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal-inner{transform:scale(1) translateY(0);}
.modal-sticker{
  width:220px;flex-shrink:0;
  transform:rotate(-6deg);
  border-radius:12px;
  box-shadow:0 24px 56px rgba(0,0,0,0.75);
}
.modal-sticker img{width:100%;height:auto;display:block;border-radius:12px;}
.modal-info{
  flex:1;background:white;border-radius:16px;
  padding:22px 24px;position:relative;
}
.modal-btns{position:absolute;top:12px;right:12px;display:flex;gap:6px;}
.modal-icon-btn{
  width:32px;height:32px;border-radius:50%;
  border:2px solid #e0e0e0;background:white;
  font-size:15px;cursor:pointer;color:#555;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.modal-icon-btn:hover{background:#f5f5f5;border-color:#bbb;}
.modal-player-name{
  font-family:'Bebas Neue',sans-serif;font-size:28px;
  letter-spacing:2px;color:#111;line-height:1;
  margin-bottom:16px;padding-right:40px;
}
.modal-player-name span{color:var(--col-b);}
.modal-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:0.5px solid #eee;font-size:15px;
}
.modal-row:last-of-type{border-bottom:none;}
.modal-row-label{color:#888;}
.modal-row-val{color:#111;font-weight:700;}
.modal-hist-btn{
  margin-top:16px;width:100%;border:2.5px solid #111;
  background:transparent;font-family:'Bebas Neue',sans-serif;
  font-size:17px;letter-spacing:2px;color:#111;
  padding:11px;border-radius:30px;cursor:pointer;transition:all 0.2s;
}
.modal-hist-btn:hover{background:#111;color:white;}

@media(max-width:550px){
  .page-header{flex-direction:column;align-items:flex-start;}
  .team-name{font-size:30px;}
  .modal-inner{flex-direction:column;align-items:center;}
  .modal-sticker{width:160px;transform:rotate(-4deg);}
  .modal-sticker img{height:auto;}
  .stickers-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
}
</style>
</head>

function updateProgress() {
  const totalStickers = 54; // Fijado exactamente a tus 40jugadores
  const filledStickers = players.filter(function(p) { 
    return p.img && p.img.trim() !== ""; 
  }).length;
  
  const percentage = (filledStickers / totalStickers) * 100;
  
  document.getElementById('progCount').innerText = `${filledStickers}/${totalStickers}`;
  document.getElementById('progFill').style.width = `${percentage}%`;
}

function render() {
  const grid = document.getElementById('stickersGrid');
  if (!grid) return;
  grid.innerHTML = '';

  const start = currentPage * PER_PAGE;
  for (let i = 0; i < PER_PAGE; i++) {
    const slotIdx = start + i;
    const slotNum = slotIdx + 1;

    if (slotNum > 54) break;

    const pl = players.filter(function(p) { return p.id === slotNum; })[0];

    const slotDiv = document.createElement('div');
    slotDiv.className = 'slot';
    
    if (pl) {
      slotDiv.onclick = (function(playerData) {
        return function() { openModal(playerData); };
      })(pl);

      let imageHtml = '<div class="slot-empty-icon">&#128100;</div>';
      if (pl.img) {
        imageHtml = `<img src="${pl.img}" alt="">`;
      }

      slotDiv.innerHTML = `
        <div class="slot-num">${slotNum}</div>
        <div class="slot-img-wrap">${imageHtml}</div>
        <div class="slot-name">${pl.name} <span>${pl.surname}</span></div>
      `;
    }
    grid.appendChild(slotDiv);
  }

  const label = document.getElementById('pagLabel');
  if (label) label.innerText = `PÁGINA ${currentPage + 1}`;
  
  // Ejecuta la actualización de la barra cada vez que se renderiza
  updateProgress();
}

function changePage(dir) {
  currentPage += dir;
  if (currentPage < 0) currentPage = 0;
  if (currentPage > 8) currentPage = 8; // Límite exacto para 5 páginas
  render();
}

function openModal(pl) {
  const overlay = document.getElementById('modalOverlay');
  const mImg = document.getElementById('modalImg');
  const mName = document.getElementById('modalName');
  const mRows = document.getElementById('modalRows');

  if (!overlay || !mImg || !mName || !mRows) return;

  if (pl.img) {
    mImg.src = pl.img;
    mImg.style.display = 'block';
  } else {
    mImg.src = '';
    mImg.style.display = 'none';
  }

  mName.innerHTML = `${pl.name} <span>${pl.surname}</span>`;

  mRows.innerHTML = `
    <div class="modal-row"><div class="modal-row-label">Fecha de nacimiento</div><div class="modal-row-val">${pl.born || '-'}</div></div>
    <div class="modal-row"><div class="modal-row-label">Altura</div><div class="modal-row-val">${pl.height || '-'}</div></div>
    <div class="modal-row"><div class="modal-row-label">Peso</div><div class="modal-row-val">${pl.weight || '-'}</div></div>
    <div class="modal-row"><div class="modal-row-label">Posición</div><div class="modal-row-val">${pl.pos || '-'}</div></div>
    <div class="modal-row"><div class="modal-row-label">Club</div><div class="modal-row-val">${pl.club || '-'}</div></div>
  `;

  overlay.classList.add('open');
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  if (overlay) overlay.classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target.id === 'modalOverlay') closeModal();
}

window.onload = render;
</script>
